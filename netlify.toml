[[redirects]]
  from = "/"
  to = "/app-preview/"
  status = 302
  force = true

[[headers]]
  for = "/app-preview/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/app-preview/pwa/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
